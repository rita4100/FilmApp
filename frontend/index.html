<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FilmApp - Home</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header>
      <h1>🎬 FilmApp</h1>
      <nav>
        <a href="/">Domů</a>
        <a href="/top10.html">Top 10</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/mood.html">Mood Matcher</a>
        <a href="/admin.html" id="admin-link" style="display:none">Admin</a>
      </nav>
    </header>
    <div id="user-bar">
      <span id="user-info">Nepřihlášen</span>
      <button class="btn btn-red" onclick="logout()" id="logout-btn" style="display:none">Odhlásit</button>
      <a class="btn btn-blue" href="/login.html" id="login-btn">Přihlásit</a>
    </div>

    <main class="container">
      <section>
        <h2>Filmy</h2>
        <div class="filters">
          <input id="f-year" placeholder="Rok (např. 2023)" type="number" />
          <input id="f-rating" placeholder="Min. hodnocení (0–10)" type="number" step="0.1" />
          <select id="f-genre"><option value="">Všechny žánry</option></select>
          <select id="f-sort">
            <option value="rating">Hodnocení ↓</option>
            <option value="year">Rok ↓</option>
            <option value="title">Název A–Z</option>
          </select>
          <button onclick="loadFilms()">Filtrovat</button>
          <button onclick="randomFilm()" class="btn btn-blue">🎲 Náhodný film</button>
        </div>
        <div class="films-grid" id="films-grid"></div>
      </section>
    </main>

    <div id="modal" onclick="closeModal(event)">
      <div class="modal-content">
        <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">✕</button>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <div id="fullscreen-trailer" class="fullscreen-overlay"></div>

    <script src="/static/app.js"></script>
  </body>
</html>
