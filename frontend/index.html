<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FilmApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: #eee; }
    header { background: #1a1a2e; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
    header h1 { color: #e94560; font-size: 1.6rem; }
    nav a { color: #aaa; text-decoration: none; margin: 0 12px; }
    nav a:hover { color: #e94560; }
    .container { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
    .films-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .film-card { background: #1a1a2e; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform .2s; }
    .film-card:hover { transform: scale(1.04); }
    .film-card img { width: 100%; height: 270px; object-fit: cover; background: #333; }
    .film-card .info { padding: 10px; }
    .film-card .title { font-size: .9rem; font-weight: bold; margin-bottom: 4px; }
    .film-card .rating { color: #f5c518; font-size: .8rem; }
    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .filters input, .filters select, .filters button {
      padding: 8px 14px; border-radius: 6px; border: none;
      background: #1a1a2e; color: #eee; cursor: pointer;
    }
    .filters button { background: #e94560; }
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; overflow-y: auto; }
    .modal-content { background: #1a1a2e; max-width: 700px; margin: 40px auto; border-radius: 12px; overflow: hidden; }
    .modal-body { display: flex; gap: 20px; padding: 24px; }
    .modal-body img { width: 200px; height: 300px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .modal-close { float: right; background: none; border: none; color: #eee; font-size: 1.4rem; cursor: pointer; padding: 12px; }
    .badge { display: inline-block; background: #e94560; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: .75rem; margin: 3px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; margin: 4px; }
    .btn-red { background: #e94560; color: #fff; }
    .btn-blue { background: #0f3460; color: #fff; }
    section h2 { margin-bottom: 16px; color: #e94560; }
    #login-panel { background: #1a1a2e; padding: 24px; border-radius: 10px; max-width: 360px; margin: 60px auto; }
    #login-panel input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: none; background: #0f3460; color: #eee; }
    #user-bar { text-align: right; padding: 8px 32px; background: #0f3460; font-size: .85rem; }
    .mood-box { background: #1a1a2e; padding: 20px; border-radius: 10px; margin-bottom: 28px; }
    .mood-box input { width: 60%; padding: 10px; border-radius: 6px; border: none; background: #0f3460; color: #eee; }
  </style>
</head>
<body>

<header>
  <h1>🎬 FilmApp</h1>
  <nav>
    <a href="#" onclick="showSection('home')">Domů</a>
    <a href="#" onclick="showSection('top10')">Top 10</a>
    <a href="#" onclick="showSection('watchlist')">Watchlist</a>
    <a href="#" onclick="showSection('mood')">Mood Matcher</a>
    <a href="#" onclick="showSection('admin')" id="admin-link" style="display:none">Admin</a>
  </nav>
</header>

<div id="user-bar">
  <span id="user-info">Nepřihlášen</span>
  <button class="btn btn-red" onclick="logout()" id="logout-btn" style="display:none">Odhlásit</button>
  <button class="btn btn-blue" onclick="showSection('login')" id="login-btn">Přihlásit</button>
</div>

<!-- LOGIN -->
<div id="section-login" style="display:none">
  <div id="login-panel">
    <h2>Přihlášení</h2>
    <input id="l-user" placeholder="Username" />
    <input id="l-pass" type="password" placeholder="Heslo" />
    <button class="btn btn-red" style="width:100%;margin-top:10px" onclick="login()">Přihlásit</button>
    <hr style="margin:16px 0;border-color:#333">
    <h3>Registrace</h3>
    <input id="r-user" placeholder="Username" />
    <input id="r-pass" type="password" placeholder="Heslo" />
    <button class="btn btn-blue" style="width:100%;margin-top:10px" onclick="register()">Registrovat</button>
    <p id="auth-msg" style="color:#e94560;margin-top:10px"></p>
  </div>
</div>

<!-- HOME -->
<div id="section-home" class="container">
  <section>
    <h2>Filmy</h2>
    <div class="filters">
      <select id="f-year"><option value="">Všechny roky</option></select>
      <select id="f-rating"><option value="">Min. hodnocení</option></select>
      <select id="f-genre"><option value="">Všechny žánry</option></select>
      <select id="f-sort">
        <option value="rating|desc">Hodnocení ↓</option>
        <option value="rating|asc">Hodnocení ↑</option>
        <option value="year|desc">Rok ↓</option>
        <option value="year|asc">Rok ↑</option>
        <option value="title|asc">Název A–Z</option>
        <option value="title|desc">Název Z–A</option>
      </select>
      <button onclick="loadFilms()">Filtrovat</button>
      <button onclick="randomFilm()" class="btn btn-blue">🎲 Náhodný film</button>
    </div>
    <div class="films-grid" id="films-grid"></div>
  </section>
</div>

<!-- TOP 10 -->
<div id="section-top10" class="container" style="display:none">
  <section>
    <h2>🏆 Top 10 filmů</h2>
    <div class="films-grid" id="top10-grid"></div>
  </section>
</div>

<!-- WATCHLIST -->
<div id="section-watchlist" class="container" style="display:none">
  <section>
    <h2>📋 Můj Watchlist</h2>
    <div class="films-grid" id="watchlist-grid"></div>
  </section>
</div>

<!-- MOOD MATCHER -->
<div id="section-mood" class="container" style="display:none">
  <section>
    <h2>🧠 Mood Matcher</h2>
    <div class="mood-box">
      <p style="margin-bottom:12px">Napiš náladu nebo klíčová slova (např. "romantika Paříž" nebo "akce vesmír"):</p>
      <input id="mood-input" placeholder="Tvá nálada..." />
      <button class="btn btn-red" onclick="moodMatch()">Najít filmy</button>
    </div>
    <div class="films-grid" id="mood-grid"></div>
  </section>
</div>

<!-- ADMIN -->
<div id="section-admin" class="container" style="display:none">
  <section>
    <h2>⚙️ Admin panel</h2>
    <h3 style="margin:16px 0 8px">Uživatelé</h3>
    <div id="admin-users"></div>
    <h3 style="margin:24px 0 8px">Přidat film</h3>
    <div style="background:#1a1a2e;padding:20px;border-radius:10px;max-width:500px">
      <input id="a-title" placeholder="Název" style="width:100%;padding:8px;margin:4px 0;background:#0f3460;border:none;color:#eee;border-radius:6px">
      <input id="a-year" placeholder="Rok" style="width:100%;padding:8px;margin:4px 0;background:#0f3460;border:none;color:#eee;border-radius:6px">
      <textarea id="a-desc" placeholder="Popis" style="width:100%;padding:8px;margin:4px 0;background:#0f3460;border:none;color:#eee;border-radius:6px;height:80px"></textarea>
      <input id="a-rating" placeholder="Hodnocení (0–10)" style="width:100%;padding:8px;margin:4px 0;background:#0f3460;border:none;color:#eee;border-radius:6px">
      <button class="btn btn-red" onclick="adminAddFilm()">Přidat film</button>
    </div>
  </section>
</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">✕</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API = "http://localhost:5002";
let currentUser = JSON.parse(localStorage.getItem("user") || "null");

function updateUserBar() {
  if (currentUser) {
    document.getElementById("user-info").textContent = `👤 ${currentUser.username} (${currentUser.role})`;
    document.getElementById("logout-btn").style.display = "inline";
    document.getElementById("login-btn").style.display = "none";
    if (currentUser.role === "admin") document.getElementById("admin-link").style.display = "inline";
  }
}
updateUserBar();

function showSection(name) {
  ["home","top10","watchlist","mood","admin","login"].forEach(s => {
    document.getElementById("section-" + s).style.display = "none";
  });
  document.getElementById("section-" + name).style.display = "block";
  if (name === "home") loadFilms();
  if (name === "top10") loadTop10();
  if (name === "watchlist") loadWatchlist();
  if (name === "admin") loadAdmin();
}

async function loadFilms() {
  const year    = document.getElementById("f-year").value;
  const rating  = document.getElementById("f-rating").value;
  const genre   = document.getElementById("f-genre").value;
  const sortVal = document.getElementById("f-sort").value.split("|");
  const sort    = sortVal[0];
  const order   = sortVal[1] || 'desc';
  let url = `${API}/films?sort=${sort}&order=${order}`;
  if (year) url += `&year=${year}`;
  if (rating) url += `&min_rating=${rating}`;
  if (genre) url += `&genre=${encodeURIComponent(genre)}`;
  const data = await fetch(url).then(r => r.json());
  renderFilms("films-grid", data);
}

async function loadTop10() {
  const data = await fetch(`${API}/films/top10`).then(r => r.json());
  renderFilms("top10-grid", data);
}

async function loadWatchlist() {
  if (!currentUser) { alert("Musíš být přihlášen!"); return; }
  const data = await fetch(`${API}/watchlist/${currentUser.id}`).then(r => r.json());
  renderFilms("watchlist-grid", data);
}

async function moodMatch() {
  const mood = document.getElementById("mood-input").value;
  if (!mood) return;
  const data = await fetch(`${API}/mood-match`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({mood})
  }).then(r => r.json());
  renderFilms("mood-grid", data);
}

async function randomFilm() {
  const year = document.getElementById("f-year").value;
  const rating = document.getElementById("f-rating").value || 0;
  const url = `${API}/films/random?min_rating=${rating}` + (year ? `&year=${year}` : '');
  const resp = await fetch(url);
  if (!resp.ok) { alert('Žádný film nenalezen'); return; }
  const film = await resp.json();
  openModal(film.id);
}

function renderFilms(gridId, films) {
  const grid = document.getElementById(gridId);
  if (!films.length) { grid.innerHTML = "<p style='color:#888'>Žádné filmy nenalezeny.</p>"; return; }
  grid.innerHTML = films.map(f => `
    <div class="film-card" onclick="openModal(${f.id})">
      <img src="${f.poster_url || ''}" alt="${f.title}" onerror="this.src='https://via.placeholder.com/180x270?text=No+Image'" />
      <div class="info">
        <div class="title">${f.title}</div>
        <div class="rating">⭐ ${f.rating?.toFixed(1) || "?"} &nbsp; 📅 ${f.year || "?"}</div>
        ${f.status ? `<div class="badge">${f.status}</div>` : ""}
      </div>
    </div>
  `).join("");
}

async function openModal(filmId) {
  const film = await fetch(`${API}/films/${filmId}`).then(r => r.json());
  const watchlistBtns = currentUser ? `
    <div style="margin-top:12px">
      <strong>Přidat do:</strong><br>
      <button class="btn btn-red" onclick="setWatchlist(${film.id},'seen')">✅ Viděl jsem</button>
      <button class="btn btn-blue" onclick="setWatchlist(${film.id},'want')">🔖 Chci vidět</button>
      <button class="btn btn-red" onclick="setWatchlist(${film.id},'fav')">❤️ Oblíbený</button>
    </div>
    <div style="margin-top:10px">
      <strong>Hodnocení:</strong>
      <input id="rate-input" type="number" min="1" max="10" placeholder="1–10" style="width:60px;padding:6px;background:#0f3460;border:none;color:#eee;border-radius:6px">
      <button class="btn btn-blue" onclick="rateFilm(${film.id})">Ohodnotit</button>
    </div>
  ` : "";

  const trailer = film.trailer_key
    ? `<div style="margin-top:14px"><iframe width="100%" height="200" src="https://www.youtube.com/embed/${film.trailer_key}" frameborder="0" allowfullscreen></iframe></div>`
    : "";

  const soundtracks = film.soundtracks?.length
    ? `<div style="margin-top:12px"><strong>🎵 Soundtrack:</strong><ul style="margin-top:6px;padding-left:16px">${film.soundtracks.map(s => `<li>${s.song_title} — ${s.artist}</li>`).join("")}</ul></div>`
    : "";

  document.getElementById("modal-body").innerHTML = `
    <img src="${film.poster_url || ''}" alt="${film.title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'" />
    <div style="flex:1">
      <h2>${film.title}</h2>
      <p style="color:#aaa;margin:6px 0">${film.year || ""} &nbsp; ⭐ ${film.rating?.toFixed(1) || "?"}</p>
      <div>${(film.genres || []).map(g => `<span class="badge">${g}</span>`).join("")}</div>
      <p style="margin-top:12px;font-size:.9rem;color:#ccc">${film.description || ""}</p>
      ${soundtracks}
      ${trailer}
      ${watchlistBtns}
    </div>
  `;
  document.getElementById("modal").style.display = "block";
}

function closeModal(e) {
  if (e.target.id === "modal") document.getElementById("modal").style.display = "none";
}

async function setWatchlist(filmId, status) {
  if (!currentUser) { alert("Musíš být přihlášen!"); return; }
  await fetch(`${API}/watchlist`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({user_id: currentUser.id, film_id: filmId, status})
  });
  alert("Uloženo!");
}

async function rateFilm(filmId) {
  if (!currentUser) { alert("Musíš být přihlášen!"); return; }
  const score = parseInt(document.getElementById("rate-input").value);
  if (!score || score < 1 || score > 10) { alert("Zadej číslo 1–10"); return; }
  await fetch(`${API}/ratings`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({user_id: currentUser.id, film_id: filmId, score})
  });
  alert("Hodnocení uloženo!");
}

async function login() {
  const username = document.getElementById("l-user").value;
  const password = document.getElementById("l-pass").value;
  const resp = await fetch(`${API}/login`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username, password})
  });
  const data = await resp.json();
  if (resp.ok) {
    currentUser = data;
    localStorage.setItem("user", JSON.stringify(data));
    updateUserBar();
    showSection("home");
  } else {
    document.getElementById("auth-msg").textContent = data.error;
  }
}

async function register() {
  const username = document.getElementById("r-user").value;
  const password = document.getElementById("r-pass").value;
  const resp = await fetch(`${API}/register`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username, password})
  });
  const data = await resp.json();
  document.getElementById("auth-msg").textContent = data.message || data.error;
}

function logout() {
  currentUser = null;
  localStorage.removeItem("user");
  document.getElementById("user-info").textContent = "Nepřihlášen";
  document.getElementById("logout-btn").style.display = "none";
  document.getElementById("login-btn").style.display = "inline";
  document.getElementById("admin-link").style.display = "none";
  showSection("home");
}

async function loadAdmin() {
  if (!currentUser || currentUser.role !== "admin") { alert("Nemáš přístup!"); return; }
  const users = await fetch(`${API}/admin/users`).then(r => r.json());
  document.getElementById("admin-users").innerHTML = users.map(u => `
    <div style="background:#0f3460;padding:10px;border-radius:6px;margin:6px 0;display:flex;align-items:center;gap:12px">
      <span>${u.username} (${u.role})</span>
      ${u.banned ? '<span style="color:#e94560">BANNED</span>' : ""}
      ${u.role !== "admin" ? `<button class="btn btn-red" onclick="banUser(${u.id}, ${!u.banned})">${u.banned ? "Odblokovat" : "Zablokovat"}</button>` : ""}
    </div>
  `).join("");
}

async function banUser(userId, ban) {
  await fetch(`${API}/admin/ban/${userId}`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ban})
  });
  loadAdmin();
}

async function adminAddFilm() {
  const title  = document.getElementById("a-title").value;
  const year   = document.getElementById("a-year").value;
  const desc   = document.getElementById("a-desc").value;
  const rating = document.getElementById("a-rating").value;
  await fetch(`${API}/admin/films`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({title, year: parseInt(year), description: desc, rating: parseFloat(rating)})
  });
  alert("Film přidán!");
}

// Načti žánry do filtru
fetch(`${API}/genres`).then(r => r.json()).then(genres => {
  const sel = document.getElementById("f-genre");
  genres.forEach(g => sel.innerHTML += `<option value="${g.name}">${g.name}</option>`);
});

// Načti dostupné roky a hodnocení pro selecty
fetch(`${API}/options`).then(r => r.json()).then(opts => {
  const years = opts.years || [];
  const yrSel = document.getElementById('f-year');
  years.forEach(y => yrSel.innerHTML += `<option value="${y}">${y}</option>`);

  const ratings = opts.ratings || [];
  const rSel = document.getElementById('f-rating');
  rSel.innerHTML = `<option value="">Min. hodnocení</option>`;
  ratings.forEach(r => rSel.innerHTML += `<option value="${r}">${r}</option>`);
}).catch(()=>{});

// Spusť domovskou stránku
showSection("home");
</script>
</body>
</html>
