<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FilmApp - Přihlášení</title>
    <script src="/static/theme-init.js"></script>
    <link rel="stylesheet" href="/static/style.css?v=theme-1">
  </head>
  <body>
    <header>
      <div class="header-brand">
        <h1>🎬 FilmApp</h1>
        <nav>
          <a href="/">Domů</a>
          <a href="/top10.html">Top 10</a>
          <a href="/watchlist.html">Seznam</a>
          <a href="/admin.html" id="admin-link" style="display:none">Admin</a>
        </nav>
      </div>
      <div class="theme-toggle-host">
        <span class="theme-label" id="theme-label-dark">🌙</span>
        <button type="button" id="theme-toggle" class="theme-toggle" role="switch" aria-checked="false" aria-label="Přepnout světlý nebo tmavý vzhled">
          <span class="theme-toggle__track"><span class="theme-toggle__thumb"></span></span>
        </button>
        <span class="theme-label" id="theme-label-light">☀️</span>
      </div>
    </header>
    <div id="section-login">
      <div id="login-panel">
        <h2>Přihlášení</h2>
  <input id="l-user" placeholder="Uživatelské jméno" />
  <input id="l-pass" type="password" placeholder="Heslo" />
        <button class="btn btn-red" style="width:100%;margin-top:10px" onclick="login()">Přihlásit</button>
        <hr class="login-divider">
        <h3>Registrace</h3>
  <input id="r-user" placeholder="Uživatelské jméno" />
  <input id="r-pass" type="password" placeholder="Heslo" />
        <button class="btn btn-blue" style="width:100%;margin-top:10px" onclick="register()">Registrovat</button>
        <p id="auth-msg"></p>
      </div>
    </div>
    <script src="/static/app.js?v=theme-1"></script>
  </body>
</html>
