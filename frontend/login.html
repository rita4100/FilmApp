<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FilmApp - Přihlášení</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header>
      <h1>🎬 FilmApp</h1>
      <nav>
        <a href="/">Domů</a>
        <a href="/top10.html">Top 10</a>
        <a href="/watchlist.html">Seznam</a>
        <a href="/admin.html" id="admin-link" style="display:none">Admin</a>
      </nav>
    </header>
    <div id="section-login">
      <div id="login-panel">
        <h2>Přihlášení</h2>
  <input id="l-user" placeholder="Uživatelské jméno" />
  <input id="l-pass" type="password" placeholder="Heslo" />
        <button class="btn btn-red" style="width:100%;margin-top:10px" onclick="login()">Přihlásit</button>
        <hr style="margin:16px 0;border-color:#333">
        <h3>Registrace</h3>
  <input id="r-user" placeholder="Uživatelské jméno" />
  <input id="r-pass" type="password" placeholder="Heslo" />
        <button class="btn btn-blue" style="width:100%;margin-top:10px" onclick="register()">Registrovat</button>
        <p id="auth-msg" style="color:#e94560;margin-top:10px"></p>
      </div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
