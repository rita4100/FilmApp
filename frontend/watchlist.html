<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FilmApp - Seznam</title>
    <script src="/static/theme-init.js"></script>
    <link rel="stylesheet" href="/static/style.css?v=theme-1">
  </head>
  <body>
    <header>
      <div class="header-brand">
        <h1>🎬 FilmApp</h1>
        <nav>
          <a href="/">Domů</a>
          <a href="/top10.html">Top 10</a>
          <a href="/watchlist.html">Seznam</a>
          <a href="/admin.html" id="admin-link" style="display:none">Admin</a>
        </nav>
      </div>
      <div class="theme-toggle-host">
        <span class="theme-label" id="theme-label-dark">🌙</span>
        <button type="button" id="theme-toggle" class="theme-toggle" role="switch" aria-checked="false" aria-label="Přepnout světlý nebo tmavý vzhled">
          <span class="theme-toggle__track"><span class="theme-toggle__thumb"></span></span>
        </button>
        <span class="theme-label" id="theme-label-light">☀️</span>
      </div>
    </header>
    <div id="user-bar">
      <span id="user-info">Nepřihlášen</span>
      <button class="btn btn-red" onclick="logout()" id="logout-btn" style="display:none">Odhlásit</button>
      <a class="btn btn-blue" href="/login.html" id="login-btn">Přihlásit</a>
    </div>
    <div class="container">
      <section>
        <h2>📋 Můj seznam</h2>
        <div class="films-grid" id="watchlist-grid"></div>
      </section>
    </div>

    <div id="modal" onclick="closeModal(event)">
      <div class="modal-content">
        <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">✕</button>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <div id="fullscreen-trailer" class="fullscreen-overlay"></div>

    <script src="/static/app.js?v=theme-1"></script>
    <script>document.addEventListener('DOMContentLoaded', ()=>loadWatchlist());</script>
  </body>
</html>
