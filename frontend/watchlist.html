<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FilmApp - Seznam</title>
    <link rel="stylesheet" href="/static/style.css?v=fullscreen-modal">

  <body>
    <header>
