<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>FilmApp - Top 10</title>
    <script src="/static/theme-init.js"></script>
    <link rel="stylesheet" href="/static/style.css?v=theme-1">
  </head>
  <body>
    <header>
      <div class="header-brand">
        <h1>🎬 FilmApp</h1>
        <nav>
          <a href="/">Domů</a>
          <a href="/top10.html">Top 10</a>
          <a href="/watchlist.html">Seznam</a>
          <a href="/admin.html" id="admin-link" style="display:none">Admin</a>
        </nav>
      </div>
      <div class="theme-toggle-host">
        <span class="theme-label" id="theme-label-dark">🌙</span>
        <button type="button" id="theme-toggle" class="theme-toggle" role="switch" aria-checked="false" aria-label="Přepnout světlý nebo tmavý vzhled">
          <span class="theme-toggle__track"><span class="theme-toggle__thumb"></span></span>
        </button>
        <span class="theme-label" id="theme-label-light">☀️</span>
      </div>
    </header>
    <div class="container">
      <section>
        <h2>🏆 Top 10 filmů</h2>
        <div class="filters" style="margin-bottom:12px">
          <select id="top10-genre"><option value="">Všechny žánry</option></select>
          <select id="top10-year"><option value="">Všechny roky</option></select>
          <button class="btn" onclick="loadTop10Filtered()">Filtrovat</button>
        </div>
        <div class="films-grid" id="top10-grid"></div>
      </section>
    </div>
    <script src="/static/app.js?v=theme-1"></script>
    <script>document.addEventListener('DOMContentLoaded', ()=>loadTop10());</script>
  </body>
</html>
